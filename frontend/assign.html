<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Dispatch Control Center</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            background: #262626;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            height: 100vh;
        }

        h2 {
            font-size: 1.3rem;
            color: #4caf50;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: #b3b3b3;
        }

        select {
            padding: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .data-panel {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .panel-scroll {
            max-height: 120px;
            overflow-y: auto;
            margin-top: 6px;
            gap: 6px;
            display: flex;
            flex-direction: column;
        }

        #inventory-panel {
            flex: 1;
            min-height: 140px;
        }

        h3 {
            font-size: 0.9rem;
            color: #ff9800;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #2d2d2d;
            font-size: 0.8rem;
        }

        .stat-row span:last-child {
            font-weight: bold;
            color: #4caf50;
        }

        .feed-item {
            background: #2b2b2b;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            border-left: 3px solid #4caf50;
            line-height: 1.3;
        }

        .feed-item.news-type {
            border-left-color: #00bcd4;
        }

        .feed-item.station-type {
            border-left-color: #9c27b0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-item .timestamp {
            font-size: 0.7rem;
            color: #888;
            display: block;
            margin-top: 2px;
        }

        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .badge {
            background: #e50914;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Dispatch Command</h2>

        <div class="control-group">
            <label for="station-selector">Select Active Route Assignment:</label>
            <select id="station-selector" onchange="handleStationChange()">
                <option value="">-- View All Active Routes --</option>
            </select>
        </div>

        <div id="inventory-panel" class="data-panel">
            <h3>Selected Route Fleet Inventory</h3>
            <div id="inventory-list" class="panel-scroll" style="max-height: none; flex: 1;">
                <p style="color: #666; font-size: 0.8rem;">Select an active assignment to isolate inventory metrics.</p>
            </div>
        </div>

        <div class="data-panel">
            <h3>Registered Stations Network</h3>
            <div id="stations-network-list" class="panel-scroll">
                <p style="color: #666; font-size: 0.8rem;">Loading static profiles...</p>
            </div>
        </div>

        <div class="data-panel">
            <h3>Live Reported Incidents Feed</h3>
            <div id="incidents-feed" class="panel-scroll">
                <p style="color: #666; font-size: 0.8rem;">Loading active system alerts...</p>
            </div>
        </div>

        <div class="data-panel">
            <h3>Media Traffic Bulletins</h3>
            <div id="news-feed" class="panel-scroll">
                <p style="color: #666; font-size: 0.8rem;">Loading aggregated bulletins...</p>
            </div>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([12.9716, 77.5946], 11);

        let globalStationMarkers = [];
        let assignmentsData = [];

        // Multi-route parallel layers arrays
        let mapRoutePolylines = [];
        let mapIncidentMarkers = [];
        let mapDispatchMarkers = [];

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        async function initializeDashboardData() {
            await fetchAllPoliceStations();
            await fetchLiveAssignments();
            await fetchActiveDatabaseReports();
            await fetchLiveNewsFeeds();
        }

        async function fetchAllPoliceStations() {
            const container = document.getElementById('stations-network-list');
            try {
                const response = await fetch('/api/police_stations?city=Bangalore');
                const data = await response.json();
                const stations = data.police_stations || [];

                if (stations.length === 0) {
                    container.innerHTML = '<p style="color: #666; font-size: 0.8rem;">No profile nodes registered.</p>';
                    return;
                }

                container.innerHTML = '';
                stations.forEach(station => {
                    const item = document.createElement('div');
                    item.className = 'feed-item station-type';
                    const resourceCount = Object.keys(station.inventory || {}).length;
                    item.innerHTML = `<span><strong>${station.station_name}</strong></span>
                                      <span style="color: #9c27b0; font-weight: bold;">${resourceCount} Assets</span>`;
                    container.appendChild(item);

                    const sLat = station.coordinates.lat;
                    const sLng = station.coordinates.lng || station.coordinates.lon;

                    if (sLat && sLng) {
                        const marker = L.circleMarker([sLat, sLng], {
                            color: '#9c27b0', radius: 4, fillColor: '#9c27b0', fillOpacity: 0.3, weight: 1
                        }).bindPopup(`<b>Station Profile:</b> ${station.station_name}<br/>Registered Asset Categories: ${resourceCount}`).addTo(map);
                        globalStationMarkers.push(marker);
                    }
                });
            } catch (error) {
                console.error("Network error reading static profiles:", error);
                container.innerHTML = '<p style="color: #ff4444; font-size: 0.8rem;">Failed to load station profiles.</p>';
            }
        }

        async function fetchLiveAssignments() {
            try {
                const response = await fetch('/api/assignments?city=Bangalore');
                const data = await response.json();
                assignmentsData = data.assignments || [];

                populateStationDropdown(assignmentsData);
                plotAllAssignmentRoutes(assignmentsData);
            } catch (error) {
                console.error("Error communicating with routing engine API:", error);
            }
        }

        // Plots all lines, dispatch nodes, and targets simultaneously on load
        function plotAllAssignmentRoutes(assignments) {
            if (assignments.length === 0) return;

            let allLayersGroup = [];
            // Colors to cycle through so overlapping nodes can be cross-examined distinctly
            const routeColors = ['#ff9800', '#00bcd4', '#e91e63', '#4caf50', '#9c27b0'];

            assignments.forEach((item, index) => {
                const assign = item.assignment;
                const assignedColor = routeColors[index % routeColors.length];

                const stationLat = assign.station_coordinates.lat;
                const stationLng = assign.station_coordinates.lng || assign.station_coordinates.lon;

                const incidentLat = item.coordinates.lat;
                const incidentLng = item.coordinates.lng || item.coordinates.lon;

                // 1. Dispatch Unit Nodes
                const stationMarker = L.circleMarker([stationLat, stationLng], {
                    color: '#4caf50',
                    radius: 7,
                    fillColor: '#4caf50',
                    fillOpacity: 0.7,
                    weight: 2
                }).bindPopup(`<b>Dispatched Unit:</b> ${assign.station_name}<br>Assigned to Report: ${item.report_id}`);

                stationMarker.addTo(map);
                mapDispatchMarkers.push(stationMarker);
                allLayersGroup.push(stationMarker);

                // 2. Incident target markers
                const incidentMarker = L.marker([incidentLat, incidentLng]).bindPopup(
                    `<b>Incident ${item.report_id}</b><br>` +
                    `Type: <span class="badge">${item.issue_type}</span><br>` +
                    `Loc: ${item.location_name}<br>` +
                    `Distance: ${assign.distance_km} KM`
                );

                incidentMarker.addTo(map);
                mapIncidentMarkers.push(incidentMarker);
                allLayersGroup.push(incidentMarker);

                // 3. Multiline array tracking coordinates loop extraction
                const polylineCoordinates = assign.route_polyline.map(coord => {
                    return Array.isArray(coord) ? coord : [coord.lat || coord[0], coord.lng || coord.lon || coord[1]];
                });

                const polyline = L.polyline(polylineCoordinates, {
                    color: assignedColor,
                    weight: 3,
                    opacity: 0.7,
                    dashArray: '4, 8'
                }).addTo(map);

                mapRoutePolylines.push(polyline);
                polyline.bindPopup(`<b>Route ${item.report_id}:</b> ${assign.station_name} ➔ ${item.location_name}`);
            });

            // Adjust window frame container context onto active layer targets bounding boxes
            const boundsGroup = new L.featureGroup(allLayersGroup);
            map.fitBounds(boundsGroup.getBounds().pad(0.15));
        }

        function handleStationChange() {
            const selectedIndex = document.getElementById('station-selector').value;
            const routeColors = ['#ff9800', '#00bcd4', '#e91e63', '#4caf50', '#9c27b0'];

            // Reset back to view-all base layer styles
            mapRoutePolylines.forEach((poly, idx) => {
                const assignedColor = routeColors[idx % routeColors.length];
                poly.setStyle({ color: assignedColor, weight: 3, opacity: 0.7, dashArray: '4, 8' });
            });
            mapDispatchMarkers.forEach(m => m.setStyle({ color: '#4caf50', fillColor: '#4caf50', radius: 7, opacity: 1 }));
            mapIncidentMarkers.forEach(m => m.setOpacity(1.0));

            if (selectedIndex === "") {
                document.getElementById('inventory-list').innerHTML = '<p style="color: #666; font-size: 0.8rem;">Select an active assignment to isolate inventory metrics.</p>';

                const allLayers = [...mapDispatchMarkers, ...mapIncidentMarkers];
                if (allLayers.length > 0) {
                    const boundsGroup = new L.featureGroup(allLayers);
                    map.fitBounds(boundsGroup.getBounds().pad(0.15));
                }
                return;
            }

            const index = parseInt(selectedIndex);
            const selection = assignmentsData[index];

            // Highlight chosen route path, fade out remaining networks
            mapRoutePolylines.forEach((poly, idx) => {
                if (idx === index) {
                    poly.setStyle({ color: '#e50914', weight: 6, opacity: 1.0, dashArray: null });
                    poly.bringToFront();
                } else {
                    poly.setStyle({ opacity: 0.15 });
                }
            });

            mapDispatchMarkers.forEach((m, idx) => {
                if (idx === index) {
                    m.setStyle({ color: '#e50914', fillColor: '#e50914', radius: 10 });
                } else {
                    m.setStyle({ opacity: 0.2 });
                }
            });

            mapIncidentMarkers.forEach((m, idx) => {
                if (idx !== index) m.setOpacity(0.25);
            });

            const focusedGroup = new L.featureGroup([mapDispatchMarkers[index], mapIncidentMarkers[index]]);
            map.fitBounds(focusedGroup.getBounds().pad(0.4));

            // Populate resource configuration properties out of scheduling objects securely
            const schedulingObj = selection.scheduling || {};
            const inventory = schedulingObj.station_local_inventory || {};
            renderInventoryUI(inventory);
        }

        function renderInventoryUI(inventory) {
            const listContainer = document.getElementById('inventory-list');
            listContainer.innerHTML = '';

            if (!inventory || Object.keys(inventory).length === 0) {
                listContainer.innerHTML = '<p style="color: #999; font-size: 0.8rem;">No operational deployment units discovered.</p>';
                return;
            }

            for (const [resource, count] of Object.entries(inventory)) {
                const row = document.createElement('div');
                row.className = 'stat-row';
                row.innerHTML = `<span>${resource}</span><span>${count} Units</span>`;
                listContainer.appendChild(row);
            }
        }

        function populateStationDropdown(assignments) {
            const selector = document.getElementById('station-selector');
            assignments.forEach((item, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = `${item.assignment.station_name} ➔ ${item.issue_type} (${item.report_id})`;
                selector.appendChild(opt);
            });
        }

        async function fetchActiveDatabaseReports() {
            const container = document.getElementById('incidents-feed');
            try {
                const response = await fetch('/get_reports');
                const data = await response.json();
                const reports = data.active_reports || [];

                if (reports.length === 0) {
                    container.innerHTML = '<p style="color: #666; font-size: 0.8rem;">No active logs found in DB.</p>';
                    return;
                }

                container.innerHTML = '';
                reports.forEach(rep => {
                    const item = document.createElement('div');
                    item.className = 'feed-item';
                    item.innerHTML = `<strong>[${rep.issue_type || 'INCIDENT'}]</strong> ${rep.location_name || 'Unknown Location'}<br/>
                                      <span style="color:#aaa; font-size:0.75rem;">${rep.description || 'No description added.'}</span>`;
                    container.appendChild(item);
                });
            } catch (error) {
                container.innerHTML = '<p style="color: #ff4444; font-size: 0.8rem;">Failed to fetch database records.</p>';
            }
        }

        async function fetchLiveNewsFeeds() {
            const container = document.getElementById('news-feed');
            try {
                const response = await fetch('/get_news');
                const data = await response.json();
                const newsItems = data.active_news || [];

                if (newsItems.length === 0) {
                    container.innerHTML = '<p style="color: #666; font-size: 0.8rem;">No recent news articles logged.</p>';
                    return;
                }

                container.innerHTML = '';
                newsItems.forEach(news => {
                    const item = document.createElement('div');
                    item.className = 'feed-item news-type';
                    item.innerHTML = `<strong>${news.headline || 'Traffic Alert'}</strong><br/>
                                      <span>${news.content || news.description || ''}</span>
                                      <span class="timestamp">Source: ${news.source || 'Scraped Portal'}</span>`;
                    container.appendChild(item);
                });
            } catch (error) {
                container.innerHTML = '<p style="color: #ff4444; font-size: 0.8rem;">Failed to retrieve active bulletins.</p>';
            }
        }

        initializeDashboardData();
    </script>
</body>

</html>
