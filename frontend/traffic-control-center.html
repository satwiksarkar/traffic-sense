<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0A0E16;
      --surface: #10151F;
      --surface-2: #161D2A;
      --surface-3: #1C2433;
      --line: rgba(255,255,255,.08);
      --line-soft: rgba(255,255,255,.05);
      --ink: #EAEFF7;
      --ink-soft: #94A1B8;
      --ink-faint: #586377;
      --primary: #3E7BFA;
      --primary-soft: #7FA6FF;
      --primary-tint: rgba(62,123,250,.14);
      --danger: #E0473F;
      --danger-tint: rgba(224,71,63,.14);
      --amber: #F2A93E;
      --amber-tint: rgba(242,169,62,.14);
      --success: #1FA97A;
      --success-tint: rgba(31,169,122,.14);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow: 0 20px 40px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow-y: auto; /* Allow natural scrolling to view analytics below */
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }

    .app { display: flex; flex-direction: column; }

    .topbar {
      height: 68px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(16,21,31,.98);
      border-bottom: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 3px 18px rgba(0,0,0,.25);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(145deg, var(--primary), #1E3FAE);
      display: grid;
      place-items: center;
      box-shadow: 0 12px 28px rgba(62,123,250,.25);
    }
    .brand-mark svg { width: 22px; height: 22px; }
    .brand-copy h1 { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
    .brand-copy p { margin-top: 2px; font-size: 11px; color: var(--ink-soft); letter-spacing: .8px; text-transform: uppercase; }
    
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .pill { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03); font-size: 12px; font-weight: 700; }
    .pill-live { color: var(--success); border-color: rgba(31,169,122,.18); }
    .pill-live .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 12px rgba(31,169,122,.35); }
    .pill-count { background: rgba(62,123,250,.12); color: var(--primary); }
    .nav-link { color: var(--ink-soft); text-decoration: none; border: 1px solid rgba(255,255,255,.1); padding: 9px 14px; border-radius: 999px; transition: background .2s; }
    .nav-link:hover { background: rgba(62,123,250,.1); color: #fff; }

    /* Layout Hierarchy Configuration */
    .view-section {
      width: 100%;
      display: grid;
      padding: 20px;
      gap: 20px;
    }
    
    /* Upper Viewport (Map and Assignments Container) */
    .section-upper {
      height: calc(100vh - 68px);
      grid-template-columns: 35% 65%;
    }
    
    /* Lower Viewport (Analytics and Action queues) */
    .section-lower {
      border-top: 1px solid var(--line);
      background: #070A10;
      grid-template-columns: 45% 55%;
      min-height: 500px;
    }

    .panel {
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line-soft);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .panel-head {
      flex-shrink: 0;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .panel-head h2 { display: flex; align-items: center; gap: 12px; font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; }
    .panel-head h2 svg { width: 16px; height: 16px; }
    .count-badge { background: rgba(62,123,250,.12); color: var(--primary); font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 999px; }

    .station-list, .analytics-body, .queue-body { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .station-card, .analysis-card, .queue-card { background: var(--surface-2); border: 1px solid rgba(255,255,255,.06); border-radius: 16px; overflow: hidden; transition: all .18s ease; }
    .station-card:hover { background: var(--surface-3); }

    .station-head { display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer; }
    .station-name { font-size: 14px; font-weight: 700; color: #fff; }
    .station-sub { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
    .station-meta { display: flex; gap: 8px; align-items: center; margin-left: auto; }
    .status-pill { font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 999px; }
    .status-pill.active { background: rgba(62,123,250,.18); color: var(--primary-soft); }
    .status-pill.idle { background: rgba(31,169,122,.14); color: var(--success); }
    .station-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--primary); }
    .station-badge { font-size: 11px; color: var(--ink-soft); background: rgba(255,255,255,.04); padding: 6px 10px; border-radius: 999px; }

    .station-reports { max-height: 0; overflow: hidden; transition: max-height .32s ease; }
    .station-card.open .station-reports { max-height: 560px; border-top: 1px solid var(--line-soft); }
    .report-item { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.03); }
    .report-item:hover { background: rgba(255,255,255,.04); }
    .report-item.selected { background: rgba(62,123,250,.14); }
    
    .report-dot { width: 10px; height: 10px; border-radius: 50%; }
    .sev-high { background: var(--danger); }
    .sev-medium { background: var(--primary); }
    .sev-low { background: var(--amber); }
    .report-name { font-size: 13px; font-weight: 700; color: #fff; }
    .report-sub { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }
    
    .pri-tag { font-size: 10px; font-weight: 800; padding: 5px 9px; border-radius: 999px; text-transform: uppercase; }
    .pri-tag.sev-high { background: rgba(224,71,63,.16); color: var(--danger); }
    .pri-tag.sev-medium { background: rgba(62,123,250,.16); color: var(--primary); }
    .pri-tag.sev-low { background: rgba(242,169,62,.16); color: var(--amber); }

    .map-wrap { position: relative; flex: 1; }
    #map { position: absolute; inset: 0; border-radius: inherit; }
    .map-legend { position: absolute; left: 18px; bottom: 18px; z-index: 420; display: grid; gap: 10px; padding: 14px; background: rgba(16,21,31,.92); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; font-size: 12px; backdrop-filter: blur(12px); }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-line { width: 18px; height: 0; border-top: 3px solid var(--primary-soft); }
    .legend-line-blocked { width: 18px; height: 0; border-top: 3px dashed var(--danger); }

    /* Map Marker Elements styling */
    .station-marker-icon { width: 18px; height: 18px; border-radius: 50%; background: var(--primary); border: 3px solid #fff; box-shadow: 0 0 15px rgba(62,123,250,0.6); }
    .incident-marker { position: relative; width: 30px; height: 30px; display: grid; place-items: center; }
    .incident-marker .ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; animation: ring-pulse 2.2s ease-out infinite; }
    .incident-marker .core { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #0A0E16; z-index: 2; }
    .incident-marker.sev-high .ring { background: rgba(224,71,63,.4); }
    .incident-marker.sev-high .core { background: var(--danger); }
    .incident-marker.sev-medium .ring { background: rgba(62,123,250,.4); }
    .incident-marker.sev-medium .core { background: var(--primary); }
    
    @keyframes ring-pulse { 0% { transform: scale(.5); opacity: 1; } 100% { transform: scale(1.9); opacity: 0; } }

    /* Analytics Styles */
    .analytics-title-row { display: flex; align-items: center; justify-content: space-between; }
    .analytics-title { font-size: 18px; font-weight: 800; color: #fff; }
    .gauge-row { margin-top: 14px; }
    .gauge-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-soft); margin-bottom: 6px; }
    .gauge-track { height: 8px; border-radius: 999px; background: var(--surface-3); overflow: hidden; }
    .gauge-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-soft)); transition: width .5s; }
    .stat-tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
    .stat-tile { background: var(--surface-2); border: 1px solid rgba(255,255,255,.04); border-radius: 14px; padding: 14px; }
    .stat-tile .label { font-size: 11px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
    .stat-tile .value { font-size: 20px; font-weight: 800; color: #fff; }
    
    .timeline-card { background: var(--surface-2); border-radius: 14px; padding: 16px; margin-top: 16px; }
    .timeline-steps { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 12px; }
    .timeline-step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--surface-3); }
    .timeline-dot.active { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
    .timeline-label { font-size: 10px; color: var(--ink-soft); text-align: center; }

    /* Queue Queue items details */
    .queue-card { padding: 16px; display: grid; gap: 12px; }
    .queue-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .queue-status { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .status-enroute { background: rgba(62,123,250,.15); color: var(--primary-soft); }
    .status-progress { background: rgba(242,169,62,.15); color: var(--amber); }
    .resolve-btn { padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(31,169,122,.3); background: var(--success-tint); color: var(--success); font-weight: 700; width: 100%; transition: background .2s; }
    .resolve-btn:hover { background: rgba(31,169,122,.2); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-soft); font-size: 13px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #161D2A; border: 1px solid var(--line); color: #fff; padding: 12px 24px; border-radius: 12px; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .toast.show { opacity: 1; }

    .skeleton-card { background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 100%); background-size: 200% 100%; animation: shine 1.5s infinite; height: 90px; border-radius: 14px; }
    @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 1024px) {
      .section-upper, .section-lower { grid-template-columns: 1fr; height: auto; }
      .section-upper { height: 900px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M4 12h4l3-8 3 16 3-8h4" /></svg></div>
        <div class="brand-copy">
          <h1>Traffic Control Center</h1>
          <p>Smart City Deployment & Resolution Console</p>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="pill pill-live"><span class="dot"></span> LIVE</div>
        <div class="pill pill-count" id="activeCount">Active: 0</div>
        <a class="nav-link" href="./index.html">Return to Map</a>
      </div>
    </header>

    <section class="view-section section-upper">
      <div class="panel">
        <div class="panel-head">
          <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h4l3 7 4-14 3 7h4"/></svg>Police Assignments</h2>
          <span class="count-badge" id="stationCount">0 stations</span>
        </div>
        <div class="station-list" id="stationList"></div>
      </div>

      <div class="panel">
        <div class="map-wrap">
          <div id="map"></div>
          <div class="map-legend">
            <div class="legend-item"><span class="legend-dot" style="background:var(--primary)"></span> Police Station Node</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--danger)"></span> Critical Incident</div>
            <div class="legend-item"><span class="legend-line"></span> Dispatch Polyline</div>
            <div class="legend-item"><span class="legend-line-blocked"></span> Locked / Blocked Route</div>
          </div>
        </div>
      </div>
    </section>

    <section class="view-section section-lower">
      <div class="panel">
        <div class="panel-head">
          <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V10"/><path d="M5 21V7"/><path d="M19 21V14"/></svg>Incident Analytics Engine</h2>
        </div>
        <div class="analytics-body" id="analyticsBody"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Resolution Queue</h2>
          <span class="count-badge" id="queueCount">0 active</span>
        </div>
        <div class="queue-body" id="queueBody"></div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast">Done</div>

  <script>
    const state = {
      stations: [],
      incidents: [],
      selectedIncidentId: null,
      selectedStationId: null,
      stationMarkers: {},
      incidentMarkers: {},
      mapFeatures: [], // Track current polylines or layout indicators
      autoRefreshTimer: null
    };

    const apiRoot = window.location.origin.includes(':5001')
      ? window.location.origin.replace(':5001', ':8000')
      : (window.location.protocol === 'file:' ? 'http://localhost:8000' : window.location.origin);

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function renderSkeletons() {
      const skel = '<div class="skeleton-card"></div>'.repeat(3);
      document.getElementById('stationList').innerHTML = skel;
      document.getElementById('queueBody').innerHTML = skel;
      document.getElementById('analyticsBody').innerHTML = '<div class="empty-state">Loading operational network matrix logs...</div>';
    }

    async function loadData() {
      let stationsRaw = [];
      let assignmentsRaw = [];
      let usedFallback = false;

      try {
        const [stationsRes, assignmentsRes] = await Promise.all([
          fetch(`${apiRoot}/api/police_stations?city=Bangalore`).then(r => r.json()),
          fetch(`${apiRoot}/api/assignments?city=Bangalore`).then(r => r.json())
        ]);
        stationsRaw = stationsRes.police_stations || [];
        assignmentsRaw = assignmentsRes.assignments || [];
      } catch (err) {
        console.error("Operational pipeline fetch error, using fallbacks:", err);
        usedFallback = true;
        
        // Mock fallback data for stations and emergency dispatch routes
        stationsRaw = [
          { station_id: "peenya", station_name: "Peenya Traffic Police Station", zone: "North Zone", lat: 13.0329, lng: 77.5273 },
          { station_id: "wilson_garden", station_name: "Wilson Garden Police Station", zone: "Central Zone", lat: 12.9511, lng: 77.5960 },
          { station_id: "sadashiva_nagar", station_name: "Sadashiva Nagar Police Station", zone: "Central Zone", lat: 13.0068, lng: 77.5802 },
          { station_id: "kengeri", station_name: "Kengeri Police Station", zone: "South Zone", lat: 12.9175, lng: 77.4839 }
        ];
        
        assignmentsRaw = [
          {
            report: { report_id: "FKID000000", location_name: "Jalahalli Cross Junction", issue_type: "vehicle_breakdown", priority: "HIGH", status: "enroute", minutes_ago: 40, lat: 13.0400041, lng: 77.5180991, description: "LCV broken down at SM Circle incoming man track" },
            assignment: { assigned_station: "Peenya Traffic Police Station", station_location: { lat: 13.0329, lng: 77.5273 }, distance_km: 2.1, route: [[13.0329, 77.5273], [13.035, 77.524], [13.0400041, 77.5180991]] }
          },
          {
            report: { report_id: "FKID000003", location_name: "Bashyam Circle", issue_type: "tree_fall", priority: "HIGH", status: "progress", minutes_ago: 90, lat: 13.0061469, lng: 77.5794348, description: "Tree fall blocking road" },
            assignment: { assigned_station: "Sadashiva Nagar Police Station", station_location: { lat: 13.0068, lng: 77.5802 }, distance_km: 3.2, route: [[13.0068, 77.5802], [13.0061469, 77.5794348]] }
          }
        ];
      }

      state.stations = stationsRaw.map(s => ({
        id: s.station_id || s.station_name.toLowerCase().replace(/\s+/g, '_'),
        name: s.station_name || "Emergency Station",
        zone: s.zone || "Central District",
        lat: Number(s.lat || s.latitude),
        lng: Number(s.lng || s.longitude)
      })).filter(s => s.lat && s.lng);

      state.incidents = assignmentsRaw.map((asn, idx) => {
        const rawReport = asn.report || {};
        const coreAssignment = asn.assignment || {};
        const id = rawReport.report_id || `inc_${idx}`;

        return {
          id: id.toString(),
          location_name: rawReport.location_name || "Unknown Point",
          issue_type: rawReport.issue_type || "General Bottleneck",
          priority: (rawReport.priority || "MEDIUM").toUpperCase(),
          status: rawReport.status || "enroute",
          minutes_ago: Number(rawReport.minutes_ago || 0),
          lat: Number(rawReport.coordinates?.lat || rawReport.lat),
          lng: Number(rawReport.coordinates?.lng || rawReport.lng),
          assigned_station: coreAssignment.assigned_station || "Unassigned Control Node",
          station_location: coreAssignment.station_location || null,
          distance_km: coreAssignment.distance_km || 0,
          route_polyline: coreAssignment.route || [],
          predictive_metrics: asn.predictive_metrics || {
            eta_reach_min: Math.floor(coreAssignment.distance_km * 3) || 5,
            eta_resolve_min: 25,
            confidence: 88
          }
        };
      }).filter(i => i.lat && i.lng);

      document.getElementById('stationCount').textContent = `${state.stations.length} units`;
      document.getElementById('queueCount').textContent = `${state.incidents.length} active`;
      document.getElementById('activeCount').textContent = `Active: ${state.incidents.length}`;

      drawMapBase();
      renderStations();
      renderQueue();
      renderAnalytics();

      if (usedFallback) {
        showToast("⚠ Backend offline – displaying mock emergency dispatch channels");
      }
    }

    function drawMapBase() {
      if (!window.mapInstance) {
        window.mapInstance = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);
        L.control.zoom({ position: 'bottomright' }).addTo(window.mapInstance);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(window.mapInstance);
        setTimeout(() => {
          if (window.mapInstance) window.mapInstance.invalidateSize();
        }, 150);
      }

      // Flush old layout visual references
      Object.values(state.stationMarkers).forEach(m => window.mapInstance.removeLayer(m));
      Object.values(state.incidentMarkers).forEach(m => window.mapInstance.removeLayer(m));
      state.mapFeatures.forEach(f => window.mapInstance.removeLayer(f));
      state.stationMarkers = {}; state.incidentMarkers = {}; state.mapFeatures = [];

      // Add Station Nodes
      state.stations.forEach(st => {
        const marker = L.marker([st.lat, st.lng], {
          icon: L.divIcon({ className: '', html: '<div class="station-marker-icon"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
        }).bindPopup(`<b>${st.name}</b><br>${st.zone}`).addTo(window.mapInstance);
        state.stationMarkers[st.id] = marker;
      });

      // Add Incidents Targets
      state.incidents.forEach(inc => {
        const pClass = inc.priority === 'HIGH' ? 'sev-high' : 'sev-medium';
        const iconHtml = `<div class="incident-marker ${pClass}"><div class="ring"></div><div class="core"></div></div>`;
        
        const marker = L.marker([inc.lat, inc.lng], {
          icon: L.divIcon({ className: '', html: iconHtml, iconSize: [30, 30], iconAnchor: [15, 15] })
        }).bindPopup(`<b>${inc.issue_type}</b><br>${inc.location_name}`).addTo(window.mapInstance);
        
        marker.on('click', () => selectIncident(inc.id));
        state.incidentMarkers[inc.id] = marker;
      });

      if (state.selectedIncidentId) highlightActiveRoute();
    }

    function selectIncident(id) {
      state.selectedIncidentId = id;
      const incident = state.incidents.find(i => i.id === id);
      if (incident) {
        // Track down corresponding layout items to keep UI open flags unified
        const matchedStation = state.stations.find(s => s.name === incident.assigned_station);
        if (matchedStation) state.selectedStationId = matchedStation.id;
      }
      renderStations();
      renderQueue();
      renderAnalytics();
      highlightActiveRoute();
    }

    function highlightActiveRoute() {
      state.mapFeatures.forEach(f => window.mapInstance.removeLayer(f));
      state.mapFeatures = [];

      const incident = state.incidents.find(i => i.id === state.selectedIncidentId);
      if (!incident || !incident.route_polyline.length) return;

      // Draw high-resolution path calculated by the engine (Solid Blue line)
      const dispatchLine = L.polyline(incident.route_polyline, {
        color: '#3E7BFA', weight: 5, opacity: 0.85
      }).addTo(window.mapInstance);
      state.mapFeatures.push(dispatchLine);

      // Extract endpoint edge parameters to isolate the blocked bottleneck target (Dashed Red line)
      if (incident.route_polyline.length > 1) {
        const totalNodes = incident.route_polyline.length;
        const blockedSegment = [incident.route_polyline[totalNodes - 2], incident.route_polyline[totalNodes - 1]];
        
        const blockedLine = L.polyline(blockedSegment, {
          color: 'var(--danger)', weight: 6, opacity: 0.9, dashArray: '6, 8'
        }).addTo(window.mapInstance);
        state.mapFeatures.push(blockedLine);
      }

      window.mapInstance.fitBounds(dispatchLine.getBounds(), { padding: [50, 50] });
    }

    function renderStations() {
      const container = document.getElementById('stationList');
      container.innerHTML = '';

      state.stations.forEach(st => {
        const assigned = state.incidents.filter(i => i.assigned_station === st.name);
        const isOpen = st.id === state.selectedStationId;
        
        const card = document.createElement('div');
        card.className = `station-card ${isOpen ? 'open' : ''}`;
        card.innerHTML = `
          <div class="station-head">
            <span class="station-dot"></span>
            <div>
              <div class="station-name">${st.name}</div>
              <div class="station-sub">${st.zone}</div>
            </div>
            <div class="station-meta">
              <span class="station-badge">${assigned.length} calls</span>
              <span class="status-pill ${assigned.length ? 'active' : 'idle'}">${assigned.length ? 'Active' : 'Idle'}</span>
            </div>
          </div>
          <div class="station-reports">
            ${assigned.map(inc => `
              <div class="report-item ${inc.id === state.selectedIncidentId ? 'selected' : ''}" onclick="selectIncident('${inc.id}')">
                <span class="report-dot ${inc.priority === 'HIGH' ? 'sev-high' : 'sev-medium'}"></span>
                <div>
                  <div class="report-name">${inc.location_name}</div>
                  <div class="report-sub">${inc.issue_type} · ${inc.minutes_ago}m ago</div>
                </div>
                <span class="pri-tag ${inc.priority === 'HIGH' ? 'sev-high' : 'sev-medium'}">${inc.priority}</span>
              </div>
            `).join('')}
            ${assigned.length === 0 ? '<div style="padding:16px; font-size:12px; color:var(--ink-soft);">No emergency units assigned here.</div>' : ''}
          </div>
        `;
        
        card.querySelector('.station-head').addEventListener('click', () => {
          state.selectedStationId = isOpen ? null : st.id;
          renderStations();
        });
        container.appendChild(card);
      });
    }

    function renderAnalytics() {
      const box = document.getElementById('analyticsBody');
      const inc = state.incidents.find(i => i.id === state.selectedIncidentId);

      if (!inc) {
        box.innerHTML = '<div class="empty-state">Select an incident from the layout above to view localized predictive ETA routes and response parameters.</div>';
        return;
      }

      const metrics = inc.predictive_metrics;
      box.innerHTML = `
        <div class="analytics-title-row">
          <div>
            <div class="analytics-title">${inc.location_name}</div>
            <div class="analytics-sub">${inc.issue_type} · Assigned to ${inc.assigned_station}</div>
          </div>
          <span class="pri-tag ${inc.priority === 'HIGH' ? 'sev-high' : 'sev-medium'}">${inc.priority}</span>
        </div>
        
        <div style="font-size:12px; color:var(--ink-soft); margin-top:6px;">Calculated Transit Path Distance: <b>${inc.distance_km} km</b></div>

        <div class="gauge-row">
          <div class="gauge-label">Officers En Route <strong>${inc.priority === 'HIGH' ? '6 / 8' : '3 / 4'}</strong></div>
          <div class="gauge-track"><div class="gauge-fill" style="width: 75%"></div></div>
        </div>

        <div class="stat-tiles">
          <div class="stat-tile"><div class="label">Dispatch ETA</div><div class="value">${metrics.eta_reach_min || 8} mins</div></div>
          <div class="stat-tile"><div class="label">Certainty Metrics</div><div class="value">${metrics.confidence || 92}%</div></div>
        </div>

        <div class="timeline-card">
          <div class="timeline-steps">
            <div class="timeline-step"><span class="timeline-dot active"></span><span class="timeline-label">Ingested</span></div>
            <div class="timeline-step"><span class="timeline-dot active"></span><span class="timeline-label">Dispatched</span></div>
            <div class="timeline-step"><span class="timeline-dot ${inc.status === 'enroute' ? 'active' : ''}"></span><span class="timeline-label">En Route</span></div>
            <div class="timeline-step"><span class="timeline-dot"></span><span class="timeline-label">On Site</span></div>
            <div class="timeline-step"><span class="timeline-dot"></span><span class="timeline-label">Resolved</span></div>
          </div>
        </div>
      `;
    }

    function renderQueue() {
      const box = document.getElementById('queueBody');
      box.innerHTML = '';

      if (!state.incidents.length) {
        box.innerHTML = '<div class="empty-state">All reports fully resolved. Clear network status.</div>';
        return;
      }

      state.incidents.forEach(inc => {
        const card = document.createElement('div');
        card.className = 'queue-card';
        card.innerHTML = `
          <div class="queue-top">
            <div>
              <div class="queue-title" style="font-weight:700; color:#fff;">${inc.location_name}</div>
              <div class="queue-sub" style="font-size:12px; color:var(--ink-soft); margin-top:2px;">${inc.issue_type} · ${inc.assigned_station}</div>
            </div>
            <span class="queue-status status-enroute">${inc.status}</span>
          </div>
          <button class="resolve-btn">Mark As Cleared & Remove Lock</button>
        `;
        
        card.querySelector('.resolve-btn').addEventListener('click', async () => {
          try {
            await fetch(`${apiRoot}/api/reports/complete`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ report_id: inc.id })
            });
            showToast("Junction obstruction cleared successfully.");
            loadData();
          } catch (e) {
            showToast("Bypassed backend update; clearing locally.");
            state.incidents = state.incidents.filter(i => i.id !== inc.id);
            if (state.selectedIncidentId === inc.id) state.selectedIncidentId = null;
            drawMapBase(); renderStations(); renderQueue(); renderAnalytics();
          }
        });  
        box.appendChild(card);
      });
    }

    window.addEventListener('load', () => {
      renderSkeletons();
      drawMapBase(); // Initialize Leaflet map immediately to avoid layout grid render delays
      loadData();
    });
  </script>
</body>
</html>
